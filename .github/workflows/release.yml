name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package metadata
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "name=$(node -p "require('./package.json').name")"       >> $GITHUB_OUTPUT

      - name: Skip if already published
        id: skip
        run: |
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version 2>/dev/null; then
            echo "already-published=true" >> $GITHUB_OUTPUT
          else
            echo "already-published=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.skip.outputs.already-published == 'false'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: CLI smoke test
        if: steps.skip.outputs.already-published == 'false'
        run: node bin/cli.mjs list

      - name: npm publish
        if: steps.skip.outputs.already-published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag + GitHub release
        if: steps.skip.outputs.already-published == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.meta.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --generate-notes
